<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Library Hub{% endblock %}</title>
    <style>
        :root {
            --bg: #eef2ff;
            --surface: #ffffff;
            --surface-strong: #f8fafc;
            --text: #0f172a;
            --muted: #475569;
            --primary: #2563eb;
            --primary-soft: #dde8ff;
            --shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 25%),
                        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
            color: var(--text);
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .page-shell {
            width: min(1160px, 100%);
            margin: 0 auto;
            padding: 24px 20px 36px;
            flex: 1;
        }

        .site-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 32px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: var(--text);
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            font-weight: 800;
            letter-spacing: -0.05em;
            font-size: 1.05rem;
        }

        .brand-title {
            display: grid;
            gap: 4px;
        }

        .brand-title span {
            font-weight: 800;
            font-size: 1.1rem;
        }

        .brand-title small {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .site-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .site-nav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            color: var(--primary);
            background: rgba(37, 99, 235, 0.08);
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .site-nav a:hover {
            transform: translateY(-1px);
            background: rgba(37, 99, 235, 0.14);
        }

        .hero {
            display: grid;
            gap: 20px;
            padding: 32px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2.4rem, 4vw, 3.4rem);
            line-height: 1.05;
        }

        .hero p {
            margin: 0;
            max-width: 720px;
            color: var(--muted);
            line-height: 1.75;
            font-size: 1rem;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .form-card {
            display: grid;
            gap: 22px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid #d1d5db;
            background: #f8fafc;
            font-size: 1rem;
            color: var(--text);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(37, 99, 235, 0.2);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .text-muted {
            color: var(--muted);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
            margin-top: 18px;
        }

        th, td {
            padding: 16px 18px;
            text-align: left;
        }

        th {
            color: var(--muted);
            font-weight: 700;
            font-size: 0.95rem;
        }

        td {
            background: var(--surface-strong);
            border-radius: 16px;
            font-size: 0.98rem;
        }

        td a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        td a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 18px;
            padding: 18px 22px;
            background: #eef2ff;
            border: 1px solid rgba(37, 99, 235, 0.2);
            color: var(--text);
        }

        .panel-grid {
            display: grid;
            gap: 24px;
        }

        @media (max-width: 860px) {
            .hero {
                padding: 26px;
            }

            .page-shell {
                padding: 20px;
            }
        }

        @media (max-width: 620px) {
            .site-header {
                flex-direction: column;
                align-items: stretch;
            }

            .site-nav {
                justify-content: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="/">
                <span class="brand-mark">LH</span>
                <span class="brand-title">
                    <span>Library Hub</span>
                    <small>Smart library experience</small>
                </span>
            </a>

            <nav class="site-nav">
                <a href="/">Home</a>
                {% if session.get('user') %}
                    {% if session.get('role') == 'admin' %}
                        <a href="/admin-dashboard">Dashboard</a>
                        <a href="/add_book">Add Book</a>
                    {% else %}
                        <a href="/dashboard">My Books</a>
                    {% endif %}
                    <a href="/logout">Logout</a>
                {% else %}
                    <a href="/login">Login</a>
                    <a href="/register">Register</a>
                {% endif %}
            </nav>
        </header>

        {% block hero %}{% endblock %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
