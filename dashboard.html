<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Welcome {{ user }}</h1>

<a href="/add_book">Add Book</a>
<a href="/logout">Logout</a>

<h2>Books Available</h2>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Book Name</th>
    <th>Author</th>
    <th>Quantity</th>
    <th>Action</th>
</tr>

{% for book in books %}

<tr>
    <td>{{ book.id }}</td>
    <td>{{ book.book_name }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.quantity }}</td>

    <td>
        <a href="/issue_book/{{ book.id }}">
            Issue Book
        </a>
    </td>
</tr>

{% endfor %}

</table>

</body>
</html>
